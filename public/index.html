          </div>
          <div class="client-progress-bar">
            <div class="client-progress-fill" style="width:${job.progress}%"></div>
          </div>
          <div class="client-next">📅 Next milestone: <strong>Gunite Shell</strong> — Tuesday, June 16</div>
        </div>
      </div>

      <div class="contact-bar" style="flex-direction:column;gap:12px;">
        <div style="display:flex;gap:10px;">
          <button class="contact-btn" id="msgPm" style="flex:1;">${ICON.message}<span>Message PM</span></button>
          <button class="contact-btn" id="payInv" style="flex:1;">${ICON.invoice}<span>Pay Invoice</span></button>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;padding:0 2px;">
          Call Your Project Manager
        </div>
        <div id="pmContactList">
          <div class="pm-contact-card" data-pm="pm1" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--pool-50);border:1.5px solid var(--pool-100);border-radius:12px;margin-bottom:8px;cursor:pointer;">
            <div style="width:44px;height:44px;border-radius:50%;background:var(--pool-400);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">${myPm.initials}</div>
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:700;color:var(--gray-900);">${myPm.name}</div>
              <div style="font-size:11px;font-weight:600;color:var(--pool-500);text-transform:uppercase;letter-spacing:0.5px;">Your PM</div>
              <div style="font-size:12px;color:var(--gray-500);margin-top:2px;">${myPm.phone}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--green-500);margin-bottom:2px;" title="On-site today"></div>
              <button class="btn-primary" style="padding:8px 14px;font-size:12px;border-radius:8px;" onclick="event.stopPropagation();toast('Calling ${myPm.name}...')">📞 Call</button>
            </div>
          </div>

          <div class="pm-contact-card" data-pm="pm2" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;margin-bottom:8px;cursor:pointer;">
            <div style="width:44px;height:44px;border-radius:50%;background:var(--navy-700);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">${backupPm.initials}</div>
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:700;color:var(--gray-900);">${backupPm.name}</div>
              <div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Backup PM</div>
              <div style="font-size:12px;color:var(--gray-500);margin-top:2px;">${backupPm.phone}</div>
            </div>
            <button class="btn-secondary" style="padding:8px 14px;font-size:12px;border-radius:8px;" onclick="event.stopPropagation();toast('Calling ${backupPm.name}...')">📞 Call</button>
          </div>

          <div class="pm-contact-card" data-pm="pm3" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;cursor:pointer;">
            <div style="width:44px;height:44px;border-radius:50%;background:var(--sand-500);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">${owner.initials}</div>
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:700;color:var(--gray-900);">${owner.name}</div>
              <div style="font-size:11px;font-weight:600;color:var(--sand-500);text-transform:uppercase;letter-spacing:0.5px;">Owner · Escalation</div>
              <div style="font-size:12px;color:var(--gray-500);margin-top:2px;">${owner.phone}</div>
            </div>
            <button class="btn-secondary" style="padding:8px 14px;font-size:12px;border-radius:8px;" onclick="event.stopPropagation();toast('Calling ${owner.name} (Owner)...')">📞 Call</button>
          </div>
        </div>
      </div>

      <div class="section-title" style="margin-top:20px;">Project Timeline</div>
      <div class="milestone-timeline">
        ${job.milestones.map(m => `
          <div class="milestone ${m.done?'done':''} ${m.current?'current':''}">
            <div class="milestone-dot"></div>
            <div class="milestone-content">
              <div class="milestone-title">${m.title}</div>
              <div class="milestone-date">${m.date}</div>
              <div class="milestone-desc">${m.desc || ''}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="section-title">Updates from your team</div>
      ${job.updates.map(u => `
        <div class="update-card">
          <div class="update-header">
            <div class="update-avatar">${u.initials}</div>
            <div class="update-meta">
              <div class="update-author">${u.author}</div>
              <div class="update-time">${u.time}</div>
            </div>
          </div>
          <div class="update-message">${u.message}</div>
        </div>
      `).join('')}

      <div class="section-title">Recent Photos (${job.photos})</div>
      <div class="photo-grid" style="grid-template-columns:repeat(4,1fr);">
        ${Array.from({length: 8}).map((_,i)=> `
          <div class="photo-thumb" style="background:linear-gradient(135deg,#${['2d8653','38a169','48bb78','1a3a2a','d4a574','f5ede0','245a40','c6f6d5'][i%8]} 0%, #${['c6f6d5','1a3a2a','2d8653','48bb78','245a40','d4a574','38a169','f5ede0'][i%8]} 100%);color:white;font-size:10px;">IMG_${(i+1).toString().padStart(2,'0')}</div>
        `).join('')}
      </div>

      <div style="padding: 20px 0 40px; text-align: center; color: var(--gray-400); font-size: 12px;">
        🌴 Palm Pool & Spa Client Portal · You'll receive a text update for each new milestone.
      </div>
    </div>
  `);
  main.appendChild(view);

  view.querySelector('#msgPm').onclick = () => {
    modal('Message your PM', `
      <p style="color:var(--gray-600);font-size:13px;margin-bottom:10px;">Send a message to <strong>Jose Garcia</strong>, your Project Manager.</p>
      <textarea rows="4" style="width:100%;padding:10px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;" placeholder="Type your message..."></textarea>
    `, () => toast('Message sent to Jose Garcia ✓'), 'Send');
  };
  view.querySelector('#payInv').onclick = () => modal('Pay Invoice', `
    <div style="background:var(--gray-50);padding:16px;border-radius:10px;margin-bottom:12px;">
      <div style="font-size:13px;color:var(--gray-500);">Progress Invoice · Gunite Milestone</div>
      <div style="font-size:24px;font-weight:800;color:var(--gray-900);margin:4px 0;">$18,750.00</div>
      <div style="font-size:12px;color:var(--gray-500);">Due: June 22, 2026</div>
    </div>
    <p style="font-size:13px;color:var(--gray-600);">Demo: tap "Pay" to simulate payment.</p>
  `, () => toast('Payment received ✓ Thank you!'), 'Pay now');
}

// ============== BOOT ==============
loadState();
const savedUser = localStorage.getItem('palmpool_user');
if (savedUser) {
  try {
    STATE.user = JSON.parse(savedUser);
    if (STATE.user.role === 'crew') STATE.view = 'field';
    else if (STATE.user.role === 'client') STATE.view = 'client';
    else if (STATE.user.role === 'pm') STATE.view = 'roadmap';
    else STATE.view = 'office';
    renderApp();
  } catch(e) { renderLogin(); }
} else {
  renderLogin();
}

</script>

</body>
